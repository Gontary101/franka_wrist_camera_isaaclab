task: reaching
output_dir: data/raw/debug_reaching_smoke
start_episode_id: 0
num_episodes: 1
max_steps: 1000
settle_time_s: 1.0

record_cameras: true
camera_fps: 30
record_depth: true

seed: 123

target_object:
  catalog_config: object_catalog.generated.yaml
  geometry_config: object_geometry.generated.yaml
  category_id: sample
  variant_id: sample
  split: train
  role: target
  required_affordances: [pickable]
  required_grasp_strategy: center_top


pose_randomization:
  object_xy_range:
    x: [-0.05, 0.05]
    y: [-0.05, 0.05]
  place_xy_range:
    x: [-0.06, 0.06]
    y: [-0.06, 0.06]


lighting_randomization:
  dome_light_intensity_range: [650.0, 1200.0]
  dome_light_color_options:
    - [0.90, 0.90, 0.90]
    - [1.00, 0.92, 0.84]
    - [0.82, 0.88, 1.00]
