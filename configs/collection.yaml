output_dir: data/raw/debug_pick_place
start_episode_id: 0
num_episodes: 20
max_steps: 2400
settle_time_s: 1.0

record_cameras: true
camera_fps: 30
record_depth: true

seed: 123

target_object:
  catalog_config: object_catalog.generated.yaml
  category_id: apple
  variant_id: apple00

pose_randomization:
  object_xy_range:
    x: [-0.05, 0.05]
    y: [-0.05, 0.05]
  place_xy_range:
    x: [-0.06, 0.06]
    y: [-0.06, 0.06]


lighting_randomization:
  dome_light_intensity_range: [650.0, 1200.0]
  dome_light_color_options:
    - [0.90, 0.90, 0.90]
    - [1.00, 0.92, 0.84]
    - [0.82, 0.88, 1.00]
