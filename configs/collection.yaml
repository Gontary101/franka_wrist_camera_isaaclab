output_dir: data/raw/debug_pick_place
start_episode_id: 0
num_episodes: 20
max_steps: 2400
settle_time_s: 1.0

record_cameras: true
camera_fps: 30
record_depth: true

seed: 123

pose_randomization:
  object_xy_range:
    x: [-0.05, 0.05]
    y: [-0.05, 0.05]
  place_xy_range:
    x: [-0.06, 0.06]
    y: [-0.06, 0.06]

appearance_randomization:
  object_colors:
    - name: red
      rgb: [0.8, 0.15, 0.10]
    - name: blue
      rgb: [0.10, 0.30, 0.85]
    - name: green
      rgb: [0.10, 0.65, 0.20]
    - name: yellow
      rgb: [0.85, 0.65, 0.10]
