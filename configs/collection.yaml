    - [0.04, 0.0]
    - [0.0, -0.04]
    - [0.0, 0.04]
  place_xy_offsets:
    - [0.0, 0.0]
    - [-0.04, 0.0]
    - [0.04, 0.0]
    - [0.0, -0.04]
    - [0.0, 0.04]
