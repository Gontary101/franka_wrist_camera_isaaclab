task: pick_place
output_dir: data/raw/clutter_watch
start_episode_id: 0
num_episodes: 1
max_steps: 4800
settle_time_s: 1.0
record_cameras: true
camera_fps: 30
record_depth: false
seed: 123
target_object:
  catalog_config: object_catalog.generated.yaml
  geometry_config: object_geometry.generated.yaml
  category_id: sample
  variant_id: sample
  split: train
  role: target
  required_affordances:
  - pickable
  required_grasp_strategy: center_top
placement_target:
  catalog_config: object_catalog.generated.yaml
  geometry_config: object_geometry.generated.yaml
  category_id: sample
  variant_id: sample
  split: train
  role: target
  required_affordances:
  - container
  required_grasp_strategy: unsupported
clutter:
  catalog_config: object_catalog.generated.yaml
  geometry_config: object_geometry.generated.yaml
  count: 3
  split: train
  role: clutter
  required_affordances:
  - reachable
  required_grasp_strategy: unsupported
  xy_range:
    x:
    - 0.3
    - 1.0
    y:
    - -0.6
    - 0.6
  object_margin_m: 0.035
  placement_target_margin_m: 0.035
  clutter_margin_m: 0.025
  max_sampling_attempts: 256
pose_randomization:
  object_xy_range:
    x:
    - -0.05
    - 0.05
    y:
    - -0.05
    - 0.05
  place_xy_range:
    x:
    - -0.06
    - 0.06
    y:
    - -0.06
    - 0.06
lighting_randomization:
  dome_light_intensity_range:
  - 650.0
  - 1200.0
  dome_light_color_options:
  - - 0.9
    - 0.9
    - 0.9
  - - 1.0
    - 0.92
    - 0.84
  - - 0.82
    - 0.88
    - 1.0
